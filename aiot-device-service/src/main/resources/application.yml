server:
  port: 8081

spring:
  application:
    name: aiot-device-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1:3306}/aiot_cloud?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

emqx:
  api:
    base-url: http://${EMQX_HOST:127.0.0.1}:18083
    username: ${EMQX_API_USER}
    password: ${EMQX_API_PASSWORD}

aiot:
  internal:
    token: ${AIOT_INTERNAL_TOKEN}
  security:
    jwt:
      secret: ${AIOT_JWT_SECRET}
  home-service:
    base-url: ${AIOT_HOME_SERVICE_URL:http://127.0.0.1:8083}
  rule-service:
    base-url: ${AIOT_RULE_SERVICE_URL:http://127.0.0.1:8084}
  mqtt:
    host: ${AIOT_MQTT_HOST:mqtt.aiot.com}
    port: ${AIOT_MQTT_PORT:1883}
  events:
    device-status-stream: ${AIOT_EVENTS_DEVICE_STATUS_STREAM:aiot:stream:device-event}
    device-status-dlq-stream: ${AIOT_EVENTS_DEVICE_STATUS_DLQ_STREAM:aiot:stream:device-event:dlq}
    device-status-stream-group: ${AIOT_DEVICE_EVENTS_DEVICE_STATUS_STREAM_GROUP:aiot-device-service-group}
    device-status-stream-consumer: ${AIOT_DEVICE_EVENTS_DEVICE_STATUS_STREAM_CONSUMER:${spring.application.name}}
    pending-reclaim:
      enabled: ${AIOT_EVENTS_PENDING_RECLAIM_ENABLED:true}
      fixed-delay-ms: ${AIOT_EVENTS_PENDING_RECLAIM_FIXED_DELAY_MS:30000}
      max-batch-size: ${AIOT_EVENTS_PENDING_RECLAIM_MAX_BATCH_SIZE:64}
  device-status-buffer:
    flush-interval-ms: ${AIOT_DEVICE_STATUS_BUFFER_FLUSH_INTERVAL_MS:1000}
    max-batch-size: ${AIOT_DEVICE_STATUS_BUFFER_MAX_BATCH_SIZE:500}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${AIOT_ENV:local}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
