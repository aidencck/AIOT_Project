server:
  port: 8081

spring:
  application:
    name: aiot-device-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1:3306}/aiot_cloud?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

emqx:
  api:
    base-url: http://${EMQX_HOST:127.0.0.1}:18083
    username: ${EMQX_API_USER:admin}
    password: ${EMQX_API_PASSWORD:public}

aiot:
  internal:
    token: ${AIOT_INTERNAL_TOKEN:change-me-internal-token}
  security:
    jwt:
      secret: ${AIOT_JWT_SECRET:change-me-to-a-32-char-min-secret}
  home-service:
    base-url: ${AIOT_HOME_SERVICE_URL:http://127.0.0.1:8083}
  rule-service:
    base-url: ${AIOT_RULE_SERVICE_URL:http://127.0.0.1:8084}
  mqtt:
    host: ${AIOT_MQTT_HOST:mqtt.aiot.com}
    port: ${AIOT_MQTT_PORT:1883}
  events:
    device-status-stream: ${AIOT_EVENTS_DEVICE_STATUS_STREAM:aiot:stream:device-event}
    device-status-stream-group: ${AIOT_DEVICE_EVENTS_DEVICE_STATUS_STREAM_GROUP:aiot-device-service-group}
    device-status-stream-consumer: ${AIOT_DEVICE_EVENTS_DEVICE_STATUS_STREAM_CONSUMER:${spring.application.name}}
  device-status-buffer:
    flush-interval-ms: ${AIOT_DEVICE_STATUS_BUFFER_FLUSH_INTERVAL_MS:1000}
    max-batch-size: ${AIOT_DEVICE_STATUS_BUFFER_MAX_BATCH_SIZE:500}

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
