version: '3.8'

networks:
  aiot-net:
    driver: bridge
    name: aiot-net

volumes:
  mysql-data:
  redis-data:
  emqx-data:

services:
  mysql:
    image: mysql:8.0
    container_name: aiot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: aiot_cloud
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0-alpine
    container_name: aiot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.2
    platform: linux/amd64
    container_name: aiot-nacos
    restart: unless-stopped
    environment:
      - PREFER_HOST_MODE=hostname
      - MODE=standalone
      - TZ=Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  emqx:
    image: emqx:5.3.0
    container_name: aiot-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - emqx-data:/opt/emqx/data
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  aiot-gateway:
    image: ghcr.io/aidencck/aiot-java/aiot-gateway:${IMAGE_TAG:-main}
    container_name: aiot-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
      - AIOT_JWT_SECRET=${AIOT_JWT_SECRET}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-home-service:
    image: ghcr.io/aidencck/aiot-java/aiot-home-service:${IMAGE_TAG:-main}
    container_name: aiot-home-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8083
      - JAVA_OPTS=-Xms256m -Xmx256m
      - MYSQL_HOST=aiot-mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=aiot_home
      - MYSQL_USER=root
      - MYSQL_PWD=${MYSQL_PASSWORD}
      - REDIS_HOST=aiot-redis
      - REDIS_PORT=6379
      - AIOT_INTERNAL_TOKEN=${AIOT_INTERNAL_TOKEN}
      - AIOT_JWT_SECRET=${AIOT_JWT_SECRET}
      - AIOT_DEVICE_SERVICE_URL=http://aiot-device-service:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-rule-engine:
    image: ghcr.io/aidencck/aiot-java/aiot-rule-engine:${IMAGE_TAG:-main}
    container_name: aiot-rule-engine
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8084
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
      - REDIS_HOST=aiot-redis
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-shadow-service:
    image: ghcr.io/aidencck/aiot-java/aiot-shadow-service:${IMAGE_TAG:-main}
    container_name: aiot-shadow-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8087
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
      - REDIS_HOST=aiot-redis
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-mqtt-adapter:
    image: ghcr.io/aidencck/aiot-java/aiot-mqtt-adapter:${IMAGE_TAG:-main}
    container_name: aiot-mqtt-adapter
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8085
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-data-parser:
    image: ghcr.io/aidencck/aiot-java/aiot-data-parser:${IMAGE_TAG:-main}
    container_name: aiot-data-parser
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8086
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-device-service:
    image: ghcr.io/aidencck/aiot-java/aiot-device-service:${IMAGE_TAG:-main}
    container_name: aiot-device-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8081
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
      - MYSQL_HOST=aiot-mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=aiot-redis
      - EMQX_HOST=aiot-emqx
      - EMQX_API_USER=${EMQX_API_USER}
      - EMQX_API_PASSWORD=${EMQX_API_PASSWORD}
      - AIOT_HOME_SERVICE_URL=http://aiot-home-service:8083
      - AIOT_RULE_SERVICE_URL=http://aiot-rule-engine:8084
      - AIOT_INTERNAL_TOKEN=${AIOT_INTERNAL_TOKEN}
      - AIOT_JWT_SECRET=${AIOT_JWT_SECRET}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      aiot-home-service:
        condition: service_healthy
      aiot-rule-engine:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  aiot-auth-service:
    image: ghcr.io/aidencck/aiot-java/aiot-auth-service:${IMAGE_TAG:-main}
    container_name: aiot-auth-service
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SERVER_PORT=8082
      - JAVA_OPTS=-Xms256m -Xmx256m
      - NACOS_ADDR=${NACOS_ADDR:-aiot-nacos:8848}
      - MYSQL_HOST=aiot-mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=aiot-redis
      - AIOT_DEVICE_SERVICE_URL=http://aiot-device-service:8081
      - AIOT_INTERNAL_TOKEN=${AIOT_INTERNAL_TOKEN}
      - AIOT_EMQX_WEBHOOK_SECRET=${AIOT_EMQX_WEBHOOK_SECRET}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      aiot-device-service:
        condition: service_healthy
    networks:
      - aiot-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health/readiness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
