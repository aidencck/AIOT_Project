server:
  port: 8083

spring:
  application:
    name: aiot-shadow-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379

aiot:
  events:
    device-status-stream: ${AIOT_EVENTS_DEVICE_STATUS_STREAM:aiot:stream:device-event}
    device-status-stream-group: ${AIOT_SHADOW_EVENTS_DEVICE_STATUS_STREAM_GROUP:aiot-shadow-service-group}
    device-status-stream-consumer: ${AIOT_SHADOW_EVENTS_DEVICE_STATUS_STREAM_CONSUMER:${spring.application.name}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${AIOT_ENV:local}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
